<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monty Hall: should you switch?</title>
<style>
  :root{ --cyan:#1FC8E4; --white:#fff; --body:#E2E0FE; --faint:#C6C1F3; --coral:#FF8A78; --gold:#ffd479; --ink:#0C0820; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  .mh{
    font-family:"Poppins","Segoe UI",system-ui,-apple-system,sans-serif; color:var(--white);
    background:
      radial-gradient(130% 90% at 50% -12%, rgba(255,255,255,.12), transparent 46%),
      radial-gradient(120% 80% at 50% 120%, rgba(12,8,32,.5), transparent 55%),
      linear-gradient(135deg,#5A4EE8 0%,#766CEF 46%,#9289F5 100%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    gap:clamp(12px,2vh,20px); padding:clamp(18px,3.5vh,38px) 20px 30px;
  }
  .mh h1{font-weight:700;font-size:clamp(25px,4.2vw,44px);margin:0;letter-spacing:.2px;text-align:center;text-shadow:0 2px 18px rgba(12,8,32,.3)}
  .mh h1 .u{border-bottom:5px solid var(--cyan);padding-bottom:2px}

  .mh .nav{display:inline-flex;background:rgba(12,8,32,.3);border:1.5px solid rgba(255,255,255,.24);
    border-radius:999px;padding:5px;gap:4px;box-shadow:0 6px 18px rgba(12,8,32,.25)}
  .mh .nav button{font-family:inherit;font-weight:700;font-size:clamp(13px,1.8vw,15.5px);
    padding:9px 22px;border-radius:999px;border:0;background:transparent;color:var(--body);cursor:pointer;transition:.2s}
  .mh .nav button.on{background:var(--cyan);color:var(--ink);box-shadow:0 3px 12px rgba(31,200,228,.4)}
  .mh .nav button:focus-visible{outline:2px solid var(--white);outline-offset:2px}

  .mh .status{color:var(--white);font-size:clamp(15px,2.2vw,20px);font-weight:500;text-align:center;
    min-height:2.7em;max-width:46ch;line-height:1.4;margin:0}
  .mh .status b{color:var(--cyan)} .mh .status .g{color:var(--gold)}

  /* ---- stage ---- */
  .mh .stage{display:flex;justify-content:center;align-items:flex-end;width:100%;min-height:clamp(210px,32vh,320px)}
  .mh .stage.three{gap:clamp(22px,5vw,60px);perspective:1700px}
  .mh .stage.two{gap:clamp(40px,8vw,120px);perspective:1700px;align-items:flex-start}
  .mh .stage.hundred{display:grid;grid-template-columns:repeat(20,1fr);gap:clamp(4px,.7vw,7px);
    max-width:840px;width:100%;align-items:stretch}

  /* door base */
  .frame{position:relative;background:#120d1e;cursor:pointer;
    transition:transform .2s ease, border-color .25s, box-shadow .25s, opacity .4s ease;}
  .frame.locked{cursor:default}
  .behind{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(130% 80% at 50% 24%, #3b3555 0%, #171226 55%, #0c0820 100%);}
  .prize{line-height:1;filter:drop-shadow(0 6px 8px rgba(0,0,0,.5))}
  .slab{position:absolute;inset:0;transform-origin:left center;backface-visibility:hidden;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 2px, rgba(0,0,0,.05) 2px 5px),
      linear-gradient(90deg,#5a3a20 0%, #8a5c37 10%, #7d512f 50%, #6d4526 90%, #4c311b 100%);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.2), inset 0 3px 8px rgba(255,225,190,.14), 2px 3px 8px rgba(0,0,0,.4);}
  .num{position:absolute;left:0;right:0;text-align:center;font-weight:700;color:#f6ead2;text-shadow:0 1px 0 rgba(0,0,0,.55);}
  .knob{position:absolute;border-radius:50%;background:radial-gradient(circle at 34% 30%, #fff4cf, #d29b34 58%, #8a5e18);
    box-shadow:0 1px 2px rgba(0,0,0,.5), 0 0 0 1px rgba(0,0,0,.15);}

  /* THREE + TWO: big realistic swinging doors */
  .three .frame, .two .frame{width:clamp(112px,17.5vw,166px);height:clamp(196px,30vw,286px);
    border-radius:7px 7px 3px 3px;border:10px solid #2b2016;border-bottom-width:13px;
    box-shadow:0 22px 46px rgba(12,8,32,.5), inset 0 0 24px rgba(0,0,0,.72);}
  .three .frame::after, .two .frame::after{content:"";position:absolute;left:-10%;right:-10%;bottom:-22px;height:20px;
    border-radius:50%;background:radial-gradient(ellipse at 50% 50%, rgba(0,0,0,.5), transparent 72%);z-index:-1;}
  .three .prize, .two .prize{font-size:clamp(50px,8.5vw,84px);transform:translateY(4px)}
  .three .slab, .two .slab{border-radius:4px;transition:transform .72s cubic-bezier(.2,.75,.15,1);padding:15% 15% 12%}
  .three .frame.open .slab, .two .frame.open .slab{transform:rotateY(-118deg)}
  .three .frame:not(.locked):hover, .two .frame:not(.locked):hover{transform:translateY(-8px)}
  .three .frame:not(.locked):hover .slab, .two .frame:not(.locked):hover .slab{filter:brightness(1.08)}
  .three .num, .two .num{top:7%;font-size:clamp(19px,3.1vw,27px)}
  .three .knob, .two .knob{right:11%;top:50%;transform:translateY(-50%);width:clamp(13px,2.2vw,18px);height:clamp(13px,2.2vw,18px)}
  .three .stiles, .two .stiles{position:absolute;inset:11% 14%;display:flex;flex-direction:column;gap:9%}
  .three .panel, .two .panel{flex:1;border-radius:4px;background:linear-gradient(158deg,#6d4626,#583619);
    box-shadow:inset 2px 3px 6px rgba(0,0,0,.5), inset -2px -2px 4px rgba(255,214,170,.13);}
  .three .hinge, .two .hinge{position:absolute;left:-5px;width:8px;height:12%;background:linear-gradient(90deg,#4a3826,#2c2015);border-radius:2px}
  .three .hinge.h1, .two .hinge.h1{top:15%}.three .hinge.h2, .two .hinge.h2{bottom:15%}

  /* HUNDRED: compact tiles that open + converge */
  .hundred .frame{aspect-ratio:5/7;border-radius:3px;border:2px solid #2b2016;
    box-shadow:0 3px 7px rgba(12,8,32,.4), inset 0 0 6px rgba(0,0,0,.6);will-change:transform,opacity}
  .hundred .prize{font-size:clamp(11px,1.5vw,17px)}
  .hundred .slab{border-radius:2px;transition:opacity .3s ease, transform .3s ease}
  .hundred .frame.open .slab{opacity:0;transform:scale(.55)}
  .hundred .frame:not(.locked):hover{transform:translateY(-3px);z-index:3}
  .hundred .num{top:5%;font-size:clamp(7px,.95vw,10px)}
  .hundred .knob{right:16%;top:50%;transform:translateY(-50%);width:clamp(3px,.55vw,5px);height:clamp(3px,.55vw,5px)}

  /* pick / win / lose */
  .frame.picked{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(31,200,228,.6)}
  .three .frame.picked, .two .frame.picked{box-shadow:0 0 0 3px rgba(31,200,228,.6),0 22px 46px rgba(12,8,32,.5)}
  .frame.win{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,212,121,.65),0 0 46px rgba(255,200,90,.55)!important}
  .frame.lose{border-color:var(--coral)}
  /* 100-door pause: highlight the one door I left closed next to the picked one */
  .hundred .frame.leftclosed{border-color:var(--white);box-shadow:0 0 0 2px var(--white),0 0 16px rgba(255,255,255,.6);z-index:3}

  /* TWO-door showcase slots (labels above the two finalists) */
  .mh .slot{display:flex;flex-direction:column;align-items:center;gap:14px;animation:rise .55s cubic-bezier(.2,.8,.2,1) both}
  .mh .slot.s1{animation-delay:.12s}
  @keyframes rise{from{opacity:0;transform:translateY(22px) scale(.94)}to{opacity:1;transform:none}}
  .mh .cap{text-align:center;line-height:1.1}
  .mh .caplabel{font-size:12px;letter-spacing:2px;font-weight:700;color:var(--faint);text-transform:uppercase}
  .mh .cappct{font-size:clamp(32px,5vw,50px);font-weight:700;font-variant-numeric:tabular-nums;color:var(--faint)}
  .mh .slot.keepcap .cappct{color:var(--gold)}

  /* actions / result / scores */
  .mh .actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;min-height:50px;align-items:center}
  .mh button.act{font-family:inherit;font-weight:700;font-size:clamp(14px,2vw,17px);padding:13px 27px;
    border-radius:999px;border:2px solid var(--cyan);background:var(--cyan);color:var(--ink);cursor:pointer;
    transition:transform .12s, box-shadow .2s;box-shadow:0 4px 16px rgba(31,200,228,.32)}
  .mh button.act.ghost{background:transparent;color:var(--white);box-shadow:none}
  .mh button.act:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(31,200,228,.42)}
  .mh button.act.ghost:hover{box-shadow:none}
  .mh button.act:focus-visible{outline:3px solid var(--white);outline-offset:3px}
  .mh .result{font-size:clamp(17px,2.5vw,23px);font-weight:700;min-height:1.4em;text-align:center}
  .mh .result .w{color:var(--gold)} .mh .result .l{color:var(--coral)}
  .mh .scores{display:flex;gap:clamp(14px,3vw,40px);flex-wrap:wrap;justify-content:center;margin-top:2px}
  .mh .card{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.22);border-radius:14px;
    padding:11px 26px;min-width:168px;text-align:center}
  .mh .card .k{font-size:12px;letter-spacing:2px;color:var(--faint);font-weight:700;text-transform:uppercase}
  .mh .card .pct{font-size:clamp(26px,4.2vw,38px);font-weight:700;line-height:1.15;font-variant-numeric:tabular-nums}
  .mh .card.sw .pct{color:var(--cyan)} .mh .card.st .pct{color:var(--faint)}
  .mh .card .n{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}
  .mh .auto{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;color:var(--faint);font-size:13px}
  .mh .auto button{font-family:inherit;font-weight:700;border:1.5px solid rgba(255,255,255,.36);background:transparent;
    color:var(--white);font-size:13px;padding:8px 16px;border-radius:999px;cursor:pointer;transition:background .2s}
  .mh .auto button:hover{background:rgba(255,255,255,.12)}
  .mh .foot{color:var(--faint);font-size:12.5px;opacity:.85;text-align:center}
  @media (prefers-reduced-motion: reduce){ .slab,.frame,.mh button,.mh .slot{transition:none;animation:none} }
  .mh .brand{height:clamp(38px,5.5vw,52px);width:auto;display:block;margin:0 auto;opacity:.97;filter:drop-shadow(0 2px 10px rgba(12,8,32,.35))}
</style>
</head>

  <h1>Monty Hall: should you <span class="u">switch</span>?</h1>
  <div class="nav">
    <button type="button" id="tab3" class="on" onclick="MH.setMode(3)">3 doors</button>
    <button type="button" id="tab100" onclick="MH.setMode(100)">100 doors</button>
  </div>
  <p class="status" id="status">Pick a door.</p>
  <div class="stage three" id="stage"></div>
  <div class="actions" id="actions"></div>
  <div class="result" id="result"></div>
  <div class="scores">
    <div class="card st"><div class="k">Always stay</div><div class="pct" id="stayPct">-</div><div class="n" id="stayN">0 wins / 0</div></div>
    <div class="card sw"><div class="k">Always switch</div><div class="pct" id="switchPct">-</div><div class="n" id="switchN">0 wins / 0</div></div>
  </div>
  <div class="auto">
    See it over many rounds:
    <button type="button" onclick="MH.auto(200,false)">Stay x200</button>
    <button type="button" onclick="MH.auto(200,true)">Switch x200</button>
    <button type="button" onclick="MH.reset()">Reset scores</button>
  </div>
  <div class="foot">Monash DeepNeuron &middot; Plan Like an Engineer</div>
</div>

<script>
var MH=(function(){
  var stage=document.getElementById('stage'), statusEl=document.getElementById('status'),
      actionsEl=document.getElementById('actions'), resultEl=document.getElementById('result');
  var N=3, car, pick, keeper, opened, phase, busy=false, els=[], finalEls=[], demoRound=false;
  var scores={3:{st:{w:0,n:0},sw:{w:0,n:0}}, 100:{st:{w:0,n:0},sw:{w:0,n:0}}};
  var firstRound={3:true, 100:true};   // first demo per mode: staying always loses

  function rnd(n){return Math.floor(Math.random()*n);}
  function otherThan(p){ var k; do{k=rnd(N);}while(k===p); return k; }

  function setMode(n){
    N=n;
    document.getElementById('tab3').classList.toggle('on', n===3);
    document.getElementById('tab100').classList.toggle('on', n===100);
    start(); updateScores();
  }
  function start(){
    car=rnd(N); pick=null; keeper=null; opened=[]; phase='pick'; busy=false; finalEls=[];
    resultEl.innerHTML='';
    setStatus(N===3 ? 'Pick a door. Do not overthink it.' : 'Pick one of the 100 doors.');
    buildGrid();
    render();
  }
  function setStatus(html){ statusEl.innerHTML=html; }

  function frameHTML(i, big){
    return '<div class="behind"><span class="prize">'+(i===car?'🚗':'🐐')+'</span></div>'+
      '<div class="slab">'+
        '<span class="num">'+(i+1)+'</span>'+
        (big?'<div class="stiles"><div class="panel"></div><div class="panel"></div></div>':'')+
        '<div class="knob"></div>'+
        (big?'<div class="hinge h1"></div><div class="hinge h2"></div>':'')+
      '</div>';
  }
  function buildGrid(){
    stage.className='stage '+(N===3?'three':'hundred');
    stage.innerHTML=''; els=[];
    for(var i=0;i<N;i++){
      var f=document.createElement('div'); f.className='frame'; f.dataset.i=i;
      f.innerHTML=frameHTML(i, N===3);
      els[i]=f; stage.appendChild(f);
    }
  }
  function bindPick(){
    for(var i=0;i<N;i++){
      var f=els[i]; f.classList.toggle('locked', phase!=='pick');
      f.onclick=null; f.onkeydown=null; f.removeAttribute('tabindex'); f.removeAttribute('role');
      if(phase==='pick'){
        f.tabIndex=0; f.setAttribute('role','button'); f.setAttribute('aria-label','Door '+(i+1));
        (function(idx){ f.onclick=function(){onPick(idx);};
          f.onkeydown=function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); onPick(idx);} }; })(i);
      }
    }
  }
  function render(){ bindPick(); renderActions(); }

  function repaintPrizes(){
    for(var k=0;k<N;k++){ var p=els[k].querySelector('.prize'); if(p) p.textContent=(k===car?'🚗':'🐐'); }
  }
  function onPick(i){
    if(phase!=='pick' || busy) return;
    pick=i;
    demoRound = firstRound[N];
    if(firstRound[N]){ car=otherThan(pick); firstRound[N]=false; repaintPrizes(); } // demo: stay loses
    keeper = (car!==pick) ? car : otherThan(pick);
    opened=[]; for(var k=0;k<N;k++){ if(k!==pick && k!==keeper) opened.push(k); }
    els[pick].classList.add('picked');
    phase='ready';
    setStatus(N===3
      ? 'You picked <b>door '+(pick+1)+'</b>. Now I will open a door that has a goat behind it.'
      : 'You picked <b>1 door out of 100</b>. Now watch what happens when I open 98 goats.');
    render();
  }

  function openGoats(){
    if(phase!=='ready' || busy) return;
    busy=true; phase='opening'; renderActions();
    if(N===3){
      opened.forEach(function(k){ els[k].classList.add('open'); });
      setStatus('Door <b>'+(opened[0]+1)+'</b> has a goat. Two doors are left.');
      setTimeout(toDecide3, 900);
    } else {
      // 100-door: cascade the 98 open slowly, then STOP on the two finalists so I can explain
      opened.forEach(function(k,i){
        var slab=els[k].querySelector('.slab');
        if(slab) slab.style.transitionDelay=(i*0.014).toFixed(3)+'s';
        els[k].classList.add('open');
      });
      els[keeper].classList.add('leftclosed');
      phase='opened98'; busy=false;
      setStatus('98 goats, all open. Two doors are left: <b>your door '+(pick+1)+'</b>, and <b>door '+(keeper+1)+'</b>, the one I chose to leave closed. When you are ready, watch where all those odds go.');
      renderActions();
    }
  }

  /* 100-door: on the second click, pour the 98 into the door I left closed */
  function collapse98(){
    if(phase!=='opened98' || busy) return;
    busy=true; phase='converging'; renderActions();
    opened.forEach(function(k){ var slab=els[k].querySelector('.slab'); if(slab) slab.style.transitionDelay=''; });
    setStatus('Their chances do not vanish. They pour into the one door I left closed.');
    converge();
  }

  /* 3-door DEMO: no probabilities shown, so the room actually guesses */
  function toDecide3(){
    phase='decide'; busy=false; finalEls=els.slice();
    setStatus('Keep <b>door '+(pick+1)+'</b>, or switch to <b>door '+(keeper+1)+'</b>? Take a guess.');
    renderActions();
  }

  /* 100-door: converge the 98 into the keeper, then show two clean finalists */
  function converge(){
    var kEl=els[keeper], kr=kEl.getBoundingClientRect();
    var kcx=kr.left+kr.width/2, kcy=kr.top+kr.height/2;
    opened.forEach(function(k,i){
      var el=els[k], r=el.getBoundingClientRect();
      var dx=(kcx-(r.left+r.width/2)).toFixed(1), dy=(kcy-(r.top+r.height/2)).toFixed(1);
      el.style.transition='transform .9s cubic-bezier(.5,0,.2,1) '+(i*0.0035).toFixed(3)+'s, opacity .9s '+(i*0.0035).toFixed(3)+'s';
      requestAnimationFrame(function(){ requestAnimationFrame(function(){
        el.style.transform='translate('+dx+'px,'+dy+'px) scale(.08)'; el.style.opacity='0';
      });});
    });
    kEl.style.transition='transform .5s ease, box-shadow .5s'; kEl.style.zIndex='6';
    kEl.style.boxShadow='0 0 0 2px var(--gold),0 0 26px rgba(255,200,90,.7)';
    els[pick].style.zIndex='6';
    setTimeout(function(){ stage.style.transition='opacity .3s'; stage.style.opacity='0'; }, 1050);
    setTimeout(showcase, 1400);
  }
  function showcase(){
    stage.style.opacity=''; stage.style.transition='';
    stage.className='stage two'; stage.innerHTML=''; finalEls=[];
    var showPct = !demoRound;   // first go: hide the odds so the room actually guesses
    var items=[['YOUR DOOR', pick, '1%', 0], ['THE DOOR I LEFT', keeper, '99%', 1]];
    items.forEach(function(it){
      var isKeep = it[3]===1;
      var slot=document.createElement('div');
      slot.className='slot'+(isKeep?' s1':'')+((isKeep && showPct)?' keepcap':'');
      var pct = showPct ? it[2] : '?';
      slot.innerHTML='<div class="cap"><div class="caplabel">'+it[0]+'</div><div class="cappct">'+pct+'</div></div>';
      var f=document.createElement('div'); f.className='frame'+(it[3]===0?' picked':''); f.dataset.i=it[1];
      f.innerHTML=frameHTML(it[1], true);
      slot.appendChild(f); stage.appendChild(slot); finalEls[it[3]]=f;
    });
    phase='decide'; busy=false;
    setStatus(showPct
      ? 'Your door had a <b>1 in 100</b> chance. The door I left holds the other <span class="g">99</span>. Stay, or switch?'
      : 'Two doors are left: <b>your door</b>, or <b>the one I left closed</b>. Stay, or switch? Take a guess.');
    renderActions();
  }

  function decide(doSwitch){
    if(phase!=='decide' || busy) return;
    var finalPick = doSwitch ? keeper : pick;
    var won = (finalPick===car);
    var slot = doSwitch ? scores[N].sw : scores[N].st; slot.n++; if(won) slot.w++;
    phase='done';
    if(N===3){
      els.forEach(function(f){ f.classList.add('open'); });
      els[finalPick].classList.add(won?'win':'lose');
    } else {
      finalEls[0].classList.add('open'); finalEls[1].classList.add('open');
      (doSwitch?finalEls[1]:finalEls[0]).classList.add(won?'win':'lose');
    }
    resultEl.innerHTML = won
      ? '<span class="w">The car! '+(doSwitch?'Switching':'Staying')+' won.</span>'
      : '<span class="l">A goat. '+(doSwitch?'Switching':'Staying')+' lost this one.</span>';
    setStatus(N===3
      ? 'The car was behind <b>door '+(car+1)+'</b>. Play again, or run it many times below.'
      : 'Switching wins about <span class="g">99 times in 100</span>. Now the three door version makes sense.');
    updateScores(); renderActions();
  }

  function renderActions(){
    actionsEl.innerHTML='';
    if(phase==='ready') addBtn(N===3?'Open a goat door':'Open the other 98 doors', openGoats, false);
    else if(phase==='opened98') addBtn('Pour the 98 into one door', collapse98, false);
    else if(phase==='decide'){
      addBtn('Stay with '+(N===3?'door '+(pick+1):'your door'), function(){decide(false);}, true);
      addBtn('Switch to door '+(keeper+1), function(){decide(true);}, false);
    } else if(phase==='done') addBtn('Play again', start, false);
  }
  function addBtn(label, fn, ghost){
    var b=document.createElement('button'); b.type='button'; b.className='act'+(ghost?' ghost':'');
    b.textContent=label; b.onclick=fn; actionsEl.appendChild(b);
  }

  function pctTxt(o){ return o.n ? Math.round(100*o.w/o.n)+'%' : '-'; }
  function updateScores(){
    var s=scores[N];
    document.getElementById('stayPct').textContent=pctTxt(s.st);
    document.getElementById('switchPct').textContent=pctTxt(s.sw);
    document.getElementById('stayN').textContent=s.st.w+' wins / '+s.st.n;
    document.getElementById('switchN').textContent=s.sw.w+' wins / '+s.sw.n;
  }
  function auto(times, doSwitch){
    var s=scores[N], slot=doSwitch?s.sw:s.st;
    for(var t=0;t<times;t++){
      var c=rnd(N), p=rnd(N), keep=(c!==p)?c:otherThan(p);
      var fin=doSwitch?keep:p; if(fin===c) slot.w++; slot.n++;
    }
    updateScores();
    setStatus('Over '+slot.n+' rounds, '+(doSwitch?'switching':'staying')+' won '+pctTxt(slot)+' of the time.');
  }
  function reset(){ scores={3:{st:{w:0,n:0},sw:{w:0,n:0}},100:{st:{w:0,n:0},sw:{w:0,n:0}}}; firstRound={3:true,100:true}; updateScores(); start(); }

  setMode(3);
