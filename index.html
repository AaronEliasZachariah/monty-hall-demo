<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monty Hall — Should you switch?</title>
<style>
  :root{ --cyan:#1FC8E4; --white:#fff; --body:#E2E0FE; --faint:#C6C1F3; --coral:#FF8A78; --gold:#ffd479; --ink:#0C0820; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:"Poppins","Segoe UI",system-ui,-apple-system,sans-serif; color:var(--white);
    background:linear-gradient(135deg,#5A4EE8 0%,#766CEF 45%,#9289F5 100%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:min(6vh,50px) 20px 36px;
  }
  h1{font-weight:700;font-size:clamp(28px,5vw,50px);margin:0 0 4px;letter-spacing:.5px;text-align:center}
  h1 .u{border-bottom:5px solid var(--cyan);padding-bottom:2px}
  .sub{color:var(--faint);font-size:clamp(15px,2.4vw,20px);margin:0 0 30px;font-weight:500;min-height:1.4em;text-align:center;max-width:36ch}

  /* ---- realistic doors ---- */
  .doors{display:flex;gap:clamp(24px,5vw,58px);flex-wrap:wrap;justify-content:center;perspective:1600px}
  .frame{
    width:clamp(118px,19vw,178px);height:clamp(214px,34vw,320px);position:relative;
    border-radius:7px 7px 3px 3px;background:#120d1e;
    border:10px solid #2b2016; border-bottom-width:13px;
    box-shadow:0 20px 46px rgba(12,8,32,.5), inset 0 0 26px rgba(0,0,0,.75);
    cursor:pointer; transition:transform .18s ease, border-color .25s, box-shadow .25s;
  }
  .frame.locked{cursor:default}
  .frame:not(.locked):hover{transform:translateY(-7px)}
  .behind{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(130% 80% at 50% 26%, #37324f 0%, #171226 55%, #0c0820 100%);}
  .behind::before{content:"";position:absolute;inset:0;background:
    linear-gradient(180deg,rgba(0,0,0,.5),rgba(0,0,0,0) 30%);}
  .prize{font-size:clamp(54px,10vw,92px);line-height:1;filter:drop-shadow(0 8px 10px rgba(0,0,0,.55));transform:translateY(4px)}
  .slab{
    position:absolute;inset:0;border-radius:4px;transform-origin:left center;
    transition:transform .7s cubic-bezier(.2,.75,.15,1);backface-visibility:hidden;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 2px, rgba(0,0,0,.05) 2px 5px),
      linear-gradient(90deg,#5a3a20 0%, #855835 10%, #7a4f2f 50%, #6d4526 90%, #4f331c 100%);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.22), inset 0 2px 6px rgba(255,220,180,.12), 2px 3px 8px rgba(0,0,0,.4);
    padding:15% 15% 12%;
  }
  .frame.open .slab{transform:rotateY(-116deg)}
  .frame:not(.locked):hover .slab{filter:brightness(1.07)}
  .stiles{position:absolute;inset:11% 14%;display:flex;flex-direction:column;gap:9%}
  .panel{flex:1;border-radius:4px;background:linear-gradient(158deg,#6b4425,#583619);
    box-shadow:inset 2px 3px 6px rgba(0,0,0,.5), inset -2px -2px 4px rgba(255,214,170,.12);}
  .num{position:absolute;top:7%;left:0;right:0;text-align:center;font-size:clamp(20px,3.4vw,30px);
    font-weight:700;color:#f4e7cf;text-shadow:0 1px 0 rgba(0,0,0,.55), 0 -1px 0 rgba(255,255,255,.12);}
  .knob{position:absolute;right:11%;top:50%;transform:translateY(-50%);
    width:clamp(13px,2.4vw,19px);height:clamp(13px,2.4vw,19px);border-radius:50%;
    background:radial-gradient(circle at 34% 30%, #fff1c4, #cf9a34 58%, #8a5e18);
    box-shadow:0 2px 3px rgba(0,0,0,.55), inset 0 0 2px rgba(255,255,255,.5);}
  .hinge{position:absolute;left:-5px;width:8px;height:12%;background:linear-gradient(90deg,#4a3826,#2c2015);
    border-radius:2px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.45);}
  .hinge.h1{top:15%}.hinge.h2{bottom:15%}
  .frame.picked{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(31,200,228,.55),0 20px 46px rgba(12,8,32,.5)}
  .frame.win{border-color:var(--gold);box-shadow:0 0 0 4px rgba(255,212,121,.6),0 0 48px rgba(255,200,90,.55)}
  .frame.lose{border-color:var(--coral)}
  .tag{position:absolute;top:-27px;left:50%;transform:translateX(-50%);z-index:4;white-space:nowrap;
    font-size:12px;font-weight:700;letter-spacing:2px;color:var(--cyan)}

  .actions{display:flex;gap:16px;margin-top:30px;flex-wrap:wrap;justify-content:center;min-height:52px}
  button{font-family:inherit;font-weight:700;font-size:clamp(14px,2vw,17px);padding:13px 26px;border-radius:999px;
    border:2px solid var(--cyan);background:var(--cyan);color:var(--ink);cursor:pointer;transition:transform .12s}
  button.ghost{background:transparent;color:var(--white)}
  button:hover{transform:translateY(-2px)}
  button:focus-visible{outline:3px solid var(--white);outline-offset:3px}
  .result{margin-top:14px;font-size:clamp(18px,3vw,26px);font-weight:700;min-height:1.5em;text-align:center}
  .result .w{color:var(--cyan)} .result .l{color:var(--coral)}
  .scores{display:flex;gap:clamp(16px,4vw,60px);margin-top:auto;padding-top:34px;flex-wrap:wrap;justify-content:center}
  .card{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.25);border-radius:16px;padding:18px 30px;min-width:190px;text-align:center}
  .card .k{font-size:13px;letter-spacing:2px;color:var(--faint);font-weight:700;text-transform:uppercase}
  .card .pct{font-size:clamp(34px,6vw,52px);font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}
  .card.switch .pct{color:var(--cyan)} .card.stay .pct{color:var(--faint)}
  .card .n{font-size:13px;color:var(--faint);font-variant-numeric:tabular-nums}
  .auto{margin-top:26px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;color:var(--faint);font-size:14px}
  .auto button{border-color:rgba(255,255,255,.4);background:transparent;color:var(--white);font-size:14px;padding:9px 18px}
  .foot{margin-top:18px;color:var(--faint);font-size:13px;opacity:.85}
  @media (prefers-reduced-motion: reduce){ .slab,.frame,button{transition:none} }
</style>
</head>
<body>
  <h1>Monty Hall — should you <span class="u">switch</span>?</h1>
  <p class="sub" id="sub">Pick a door.</p>
  <div class="doors" id="doors"></div>
  <div class="actions" id="actions"></div>
  <div class="result" id="result"></div>
  <div class="scores">
    <div class="card stay"><div class="k">Always stay</div><div class="pct" id="stayPct">–</div><div class="n" id="stayN">0 wins / 0</div></div>
    <div class="card switch"><div class="k">Always switch</div><div class="pct" id="switchPct">–</div><div class="n" id="switchN">0 wins / 0</div></div>
  </div>
  <div class="auto">
    Fast-forward the maths:
    <button type="button" onclick="auto(100,false)">Stay ×100</button>
    <button type="button" onclick="auto(100,true)">Switch ×100</button>
    <button type="button" onclick="resetAll()">Reset</button>
  </div>
  <div class="foot">Stay wins ≈ 33% · Switch wins ≈ 67%. Monash DeepNeuron — Plan Like an Engineer.</div>

<script>
(function(){
  var doorsEl=document.getElementById('doors'), actEl=document.getElementById('actions'),
      resEl=document.getElementById('result'), subEl=document.getElementById('sub');
  var car, picked, opened, phase;
  var stay={w:0,n:0}, sw={w:0,n:0};
  function rnd(n){return Math.floor(Math.random()*n);}
  function newRound(){ car=rnd(3); picked=null; opened=null; phase='pick'; resEl.innerHTML=''; subEl.textContent='Pick a door.'; render(); }
  function pick(i){
    if(phase!=='pick') return;
    picked=i;
    var choices=[0,1,2].filter(function(d){return d!==picked && d!==car;});
    opened=choices[rnd(choices.length)]; phase='decide';
    subEl.innerHTML='I opened door '+(opened+1)+' — a goat. Keep door '+(picked+1)+', or switch?';
    render();
  }
  function decide(doSwitch){
    if(phase!=='decide') return;
    var other=[0,1,2].filter(function(d){return d!==picked && d!==opened;})[0];
    var finalPick=doSwitch?other:picked; var won=(finalPick===car);
    (doSwitch?sw:stay).n++; if(won)(doSwitch?sw:stay).w++;
    picked=finalPick; phase='done';
    resEl.innerHTML= won? '<span class="w">You win the car! '+(doSwitch?'Switching':'Staying')+' paid off.</span>'
                        : '<span class="l">A goat. '+(doSwitch?'Switching':'Staying')+' lost this one.</span>';
    subEl.innerHTML='Switching wins about <b>2 out of 3</b>. Play again.';
    updateScores(); render(); setTimeout(newRound, 1900);
  }
  function slabHTML(i){
    return '<div class="behind"><span class="prize">'+(i===car?'🚗':'🐐')+'</span></div>'
         + '<div class="slab">'
         +   '<span class="num">'+(i+1)+'</span>'
         +   '<div class="stiles"><div class="panel"></div><div class="panel"></div></div>'
         +   '<div class="knob"></div><div class="hinge h1"></div><div class="hinge h2"></div>'
         + '</div>';
  }
  function render(){
    doorsEl.innerHTML=''; actEl.innerHTML='';
    for(var i=0;i<3;i++){
      var f=document.createElement('div'); f.className='frame';
      var open = (phase==='decide' && i===opened) || phase==='done';
      if(phase!=='pick') f.classList.add('locked');
      if(open) f.classList.add('open');
      if(i===picked) f.classList.add('picked');
      if(phase==='done'){ if(i===car) f.classList.add('win'); else if(i===picked) f.classList.add('lose'); }
      if(phase==='pick'){ f.tabIndex=0; f.setAttribute('role','button'); f.setAttribute('aria-label','Door '+(i+1)); }
      f.innerHTML = (i===picked? '<span class="tag">YOUR PICK</span>':'') + slabHTML(i);
      if(phase==='pick'){ (function(idx){ f.onclick=function(){pick(idx);}; f.onkeydown=function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();pick(idx);}}; })(i); }
      doorsEl.appendChild(f);
    }
    if(phase==='decide'){
      var other=[0,1,2].filter(function(d){return d!==picked && d!==opened;})[0];
      var b1=document.createElement('button'); b1.type='button'; b1.className='ghost'; b1.textContent='Stay with door '+(picked+1); b1.onclick=function(){decide(false);};
      var b2=document.createElement('button'); b2.type='button'; b2.textContent='Switch to door '+(other+1); b2.onclick=function(){decide(true);};
      actEl.appendChild(b1); actEl.appendChild(b2);
    }
  }
  function pctTxt(o){ return o.n? Math.round(100*o.w/o.n)+'%' : '–'; }
  function updateScores(){
    document.getElementById('stayPct').textContent=pctTxt(stay);
    document.getElementById('switchPct').textContent=pctTxt(sw);
    document.getElementById('stayN').textContent=stay.w+' wins / '+stay.n;
    document.getElementById('switchN').textContent=sw.w+' wins / '+sw.n;
  }
  window.auto=function(times,doSwitch){
    for(var t=0;t<times;t++){
      var c=rnd(3), p=rnd(3);
      var opts=[0,1,2].filter(function(d){return d!==p && d!==c;});
      var o=opts[rnd(opts.length)];
      var other=[0,1,2].filter(function(d){return d!==p && d!==o;})[0];
      var fin=doSwitch?other:p; if(fin===c)(doSwitch?sw:stay).w++;
      (doSwitch?sw:stay).n++;
    }
    updateScores();
    subEl.innerHTML='After '+ (doSwitch?sw.n:stay.n) +' auto-rounds: '+ (doSwitch?'switching':'staying') +' wins '+ pctTxt(doSwitch?sw:stay) +'.';
  };
  window.resetAll=function(){ stay={w:0,n:0}; sw={w:0,n:0}; updateScores(); newRound(); };
  newRound(); updateScores();
})();
</script>
</body>
</html>
